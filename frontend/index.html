<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; padding: 20px; min-height: 200px; margin-bottom: 10px; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>AI Assistant</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <input type="text" id="question" placeholder="Ask anything or about the PDF...">
    <button onclick="sendMessage()">Send</button>
    <div id="chat-box">Response will appear here...</div>

    <script>
        async function sendMessage() {
            const question = document.getElementById('question').value;
            const file = document.getElementById('pdfFile').files[0];
            const chatBox = document.getElementById('chat-box');

            if (!question) return alert("Please enter a question");

            chatBox.innerText = "Thinking...";
            const formData = new FormData();
            formData.append('question', question);
            if (file) formData.append('file', file);

            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();
            chatBox.innerText = data.answer || data.error;
        }
    </script>
</body>
</html>
